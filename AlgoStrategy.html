<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlgoStrategy - 코딩 테스트 전략 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax 라이브러리 설정 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        
        :root {
            --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body { 
            font-family: var(--font-main); 
            background-color: #f8fafc; 
            -webkit-font-smoothing: antialiased;
            color: #334155;
            margin: 0;
            padding: 0;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(226, 232, 240, 1); 
        }

        .loader { 
            border-top-color: #3b82f6; 
            animation: spinner 1.5s linear infinite; 
        }
        
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        .markdown-content { font-family: var(--font-main); line-height: 1.75; word-break: break-word; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #1e293b; }
        .markdown-content p { margin-bottom: 1em; color: #475569; white-space: normal; }
        
        .markdown-content code { 
            background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px; 
            font-family: var(--font-main) !important; font-weight: 600; font-size: 0.92em; color: #ef4444; 
        }

        .markdown-content pre {
            background-color: #0f172a; color: #f8fafc; padding: 1.25rem; border-radius: 1rem;
            overflow-x: auto; margin: 1.5rem 0; font-size: 0.85em;
        }
        
        button { touch-action: manipulation; }
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen py-6 px-4 sm:py-12">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-8 sm:mb-14">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">💡 AlgoStrategy</h1>
            <p class="text-sm sm:text-lg text-slate-600 px-4 font-semibold text-blue-600">실전 기출 문제 전략 분석 도구</p>
        </header>

        <div id="app" class="glass-card rounded-[2rem] p-6 sm:p-10 shadow-2xl min-h-[500px] flex flex-col transition-all duration-500">
            
            <!-- Step 1: Level Selection -->
            <div id="step-level" class="space-y-8">
                <div class="text-center space-y-3">
                    <h2 class="text-2xl sm:text-3xl font-bold text-slate-900 tracking-tight">난이도를 선택하세요</h2>
                    <p class="text-sm sm:text-base text-slate-500 px-4 leading-relaxed">최신 데이터베이스에서 유효한 문제를 실시간 검색합니다.</p>
                </div>
                <div class="grid grid-cols-1 gap-5">
                    <button onclick="fetchProblem('초급')" class="group p-6 border-2 border-slate-100 rounded-2xl hover:border-green-500 hover:bg-green-50 transition-all text-left shadow-sm active:scale-[0.98]">
                        <span class="block text-xl font-bold text-slate-900 group-hover:text-green-600 mb-2">🌱 초급</span>
                        <span class="text-xs sm:text-sm text-slate-500 font-medium">백준 브론즈 5~1, 실버 5~3 / 프로그래머스 Lv 1~2</span>
                    </button>
                    <button onclick="fetchProblem('중급')" class="group p-6 border-2 border-slate-100 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left shadow-sm active:scale-[0.98]">
                        <span class="block text-xl font-bold text-slate-900 group-hover:text-blue-600 mb-2">🌿 중급</span>
                        <span class="text-xs sm:text-sm text-slate-500 font-medium">백준 실버 2~1, 골드 5~3 / 프로그래머스 Lv 2~3</span>
                    </button>
                    <button onclick="fetchProblem('고급')" class="group p-6 border-2 border-slate-100 rounded-2xl hover:border-red-500 hover:bg-red-50 transition-all text-left shadow-sm active:scale-[0.98]">
                        <span class="block text-xl font-bold text-slate-900 group-hover:text-red-600 mb-2">🔥 고급</span>
                        <span class="text-xs sm:text-sm text-slate-500 font-medium">백준 골드 2~1, 플래티넘 5~4 / 프로그래머스 Lv 3~4</span>
                    </button>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden flex-1 flex flex-col items-center justify-center w-full min-h-[300px]">
                <div class="flex flex-row items-center space-x-6">
                    <div class="loader ease-linear rounded-full border-[6px] border-gray-100 h-12 w-12 flex-shrink-0"></div>
                    <p id="loading-text" class="text-sm sm:text-base text-slate-700 animate-pulse font-bold leading-relaxed text-left"></p>
                </div>
            </div>

            <!-- Step 2: Problem Display & Quiz -->
            <div id="step-quiz" class="hidden space-y-8">
                <div class="bg-slate-50 p-6 rounded-[1.5rem] border border-slate-200">
                    <div class="flex flex-wrap items-center gap-3 mb-5">
                        <span id="problem-platform" class="px-3 py-1 bg-slate-900 text-white text-[11px] font-black rounded-lg uppercase tracking-wider"></span>
                        <span id="problem-level-badge" class="px-3 py-1 bg-blue-100 text-blue-700 text-[11px] font-bold rounded-lg"></span>
                        <a id="problem-link" target="_blank" class="text-[11px] text-blue-600 hover:text-blue-800 font-black flex items-center gap-1 ml-auto transition-colors border-b border-blue-200">문제 원문 보기 🔗</a>
                    </div>
                    <h3 id="problem-title" class="text-xl sm:text-2xl font-black text-slate-900 mb-5 border-b border-slate-200 pb-4 leading-tight tracking-tight"></h3>
                    <div id="problem-content" class="text-slate-800 text-[14px] sm:text-[15px] leading-relaxed max-h-[50vh] overflow-y-auto custom-scrollbar pr-4"></div>
                </div>

                <div class="space-y-6">
                    <h4 class="font-extrabold text-base sm:text-lg text-slate-900 flex items-center gap-3">
                        <span class="flex items-center justify-center w-8 h-8 bg-blue-600 text-white rounded-xl text-xs font-black shadow-lg shadow-blue-200">Q</span>
                        <span>최적의 알고리즘 전략을 고르세요:</span>
                    </h4>
                    <div id="option-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                    <button id="submit-btn" onclick="checkAnswer()" class="w-full bg-blue-600 text-white py-5 rounded-[1.25rem] font-black text-lg hover:bg-blue-700 transition-all shadow-xl shadow-blue-100 mt-4 active:scale-95 disabled:opacity-50">분석 리포트 생성</button>
                </div>
            </div>

            <!-- Step 3: Result & Analysis -->
            <div id="step-result" class="hidden space-y-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-6 bg-blue-50 rounded-[1.5rem] border border-blue-100">
                    <div class="flex flex-col">
                        <span class="text-[11px] text-blue-500 uppercase font-black tracking-[0.2em] mb-2">AI STRATEGY ANALYSIS</span>
                        <h3 id="result-problem-title" class="text-base sm:text-lg font-extrabold text-slate-900"></h3>
                    </div>
                    <a id="result-problem-link" target="_blank" class="text-xs text-blue-600 font-black flex items-center gap-1 hover:underline whitespace-nowrap">원문 다시보기 🔗</a>
                </div>

                <div id="result-status" class="text-center p-8 rounded-[2rem] border-2 transition-all duration-700 scale-in"></div>
                
                <div class="grid grid-cols-1 gap-6">
                    <div class="bg-white p-6 sm:p-8 rounded-[1.5rem] border-l-[6px] border-l-blue-500 shadow-md space-y-4">
                        <h5 class="font-black text-slate-900 flex items-center gap-2 text-xs uppercase tracking-widest text-blue-600"><span class="w-7 h-7 rounded-xl bg-blue-50 flex items-center justify-center">01</span> 전략 판단 근거</h5>
                        <div id="exp-reason" class="markdown-content text-slate-700 text-[14px] sm:text-[15px]"></div>
                    </div>
                    <div class="bg-white p-6 sm:p-8 rounded-[1.5rem] border-l-[6px] border-l-green-500 shadow-md space-y-4">
                        <h5 class="font-black text-slate-900 flex items-center gap-2 text-xs uppercase tracking-widest text-green-600"><span class="w-7 h-7 rounded-xl bg-green-50 flex items-center justify-center">02</span> 단계별 알고리즘 설계</h5>
                        <div id="exp-strategy" class="markdown-content text-slate-700 text-[14px] sm:text-[15px]"></div>
                    </div>
                    <div class="bg-white p-6 sm:p-8 rounded-[1.5rem] border-l-[6px] border-l-purple-500 shadow-md space-y-4">
                        <h5 class="font-black text-slate-900 flex items-center gap-2 text-xs uppercase tracking-widest text-purple-600"><span class="w-7 h-7 rounded-xl bg-purple-50 flex items-center justify-center">03</span> 핵심 마스터리 개념</h5>
                        <div id="exp-concept" class="markdown-content text-slate-700 text-[14px] sm:text-[15px]"></div>
                    </div>
                </div>

                <button onclick="resetApp()" class="w-full bg-slate-900 text-white py-6 rounded-[1.25rem] font-black text-lg hover:bg-slate-800 transition-all active:scale-95 shadow-2xl">다른 기출 문제 도전</button>
            </div>

        </div>
    </div>

    <script>
        const apiKey = ""; 
        let currentProblem = null;
        let selectedOption = null;
        let solvedProblemTitles = [];

        function initApp() {
            if (typeof marked !== 'undefined') {
                marked.setOptions({ 
                    breaks: true, 
                    gfm: true,
                    headerIds: false,
                    mangle: false
                });
            }
        }

        function safeJsonParse(str) {
            try {
                return JSON.parse(str);
            } catch (e) {
                const jsonMatch = str.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw e;
                let sanitized = jsonMatch[0].replace(/\\(?![nrbtu"\\\/])/g, "\\\\");
                return JSON.parse(sanitized);
            }
        }

        function renderMarkdown(targetId, content) {
            const el = document.getElementById(targetId);
            if (!el) return;

            let processed = content.replace(/\\n/g, '\n');
            el.innerHTML = `<div class="markdown-content">${marked.parse(processed)}</div>`;
            
            if(window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([el]).catch(err => console.error("MathJax error:", err));
            }
        }

        function showStep(stepId) {
            ['step-level', 'loading', 'step-quiz', 'step-result'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.toggle('hidden', id !== stepId);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function callGemini(userQuery, systemPrompt = "", isJson = false, useSearch = false) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined,
                generationConfig: isJson ? { responseMimeType: "application/json" } : {}
            };
            if (useSearch) payload.tools = [{ "google_search": {} }];

            const delays = [1000, 2000, 4000];
            for (let i = 0; i < 4; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        if (response.status === 401 && useSearch) return await callGemini(userQuery, systemPrompt, isJson, false);
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    return text;
                } catch (error) {
                    if (i < 3) await new Promise(r => setTimeout(r, delays[i]));
                    else throw error;
                }
            }
        }

        async function fetchProblem(level) {
            showStep('loading');
            let levelDesc = "";
            let strictTiers = "";
            
            // 요청하신 상세 기준 반영
            if(level === '초급') {
                levelDesc = "백준 브론즈 5,4,3,2,1 및 실버 5,4,3 / 프로그래머스 Lv 1, 2";
                strictTiers = "반드시 백준 브론즈 5~1 또는 실버 5, 4, 3 중 하나이거나 프로그래머스 레벨 1~2인 문제여야 합니다. 실버 2 이상의 문제는 절대로 가져오지 마세요.";
            }
            else if(level === '중급') {
                levelDesc = "백준 실버 2,1 및 골드 5,4,3 / 프로그래머스 Lv 2, 3";
                strictTiers = "반드시 백준 실버 2, 1 또는 골드 5, 4, 3 중 하나이거나 프로그래머스 레벨 2~3인 문제여야 합니다.";
            }
            else if(level === '고급') {
                levelDesc = "백준 골드 2,1 및 플래티넘 5,4 / 프로그래머스 Lv 3, 4";
                strictTiers = "반드시 백준 골드 2, 1 또는 플래티넘 5, 4 중 하나이거나 프로그래머스 레벨 3~4인 문제여야 합니다.";
            }

            document.getElementById('loading-text').innerText = `[${level}] ${levelDesc} 문제를 탐색 중입니다...`;

            const exclusionList = solvedProblemTitles.length > 0 ? `이미 제시했던 다음 문제들과 중복되지 않도록 주의하세요: [${solvedProblemTitles.join(', ')}]` : "";

            const sys = `당신은 알고리즘 전문가입니다. 반드시 구글 검색을 사용하여 다음 난이도 기준을 엄격히 준수하여 실존 기출 문제를 찾으세요. 
            난이도 기준: ${strictTiers}
            URL과 제목이 정확해야 합니다. ${exclusionList}
            모든 수식은 MathJax($)를 사용하되, 마크다운의 줄바꿈(\\n)이 유효한 JSON 문자열 내에서 깨지지 않도록 정확히 작성하세요. 
            JSON 응답 시 백슬래시는 반드시 이중 백슬래시(\\\\)로 처리하여 유효한 형식을 유지하십시오.`;

            const user = `실제로 존재하는 ${levelDesc} 문제를 찾아 다음 JSON으로만 응답하세요:
            {
                "platform": "사이트명",
                "origin_level": "실제 티어/레벨 (예: 실버3, Lv2)",
                "title": "실제 제목",
                "url": "정확한 URL",
                "content": "마크다운 문제 원문 (수식 필수 포함, 줄바꿈은 \\n 사용)",
                "options": ["매우 구체적인 알고리즘 기법 6개"],
                "correct_answer": "6개 중 정답"
            }`;

            try {
                const response = await callGemini(user, sys, true, true);
                currentProblem = safeJsonParse(response);
                renderQuiz();
            } catch (error) {
                console.error(error);
                alert("문제 로딩 실패: 다시 시도해주세요.");
                showStep('step-level');
            }
        }

        function renderQuiz() {
            document.getElementById('problem-platform').innerText = currentProblem.platform;
            document.getElementById('problem-level-badge').innerText = currentProblem.origin_level;
            document.getElementById('problem-title').innerText = currentProblem.title;
            document.getElementById('problem-link').href = currentProblem.url;
            
            renderMarkdown('problem-content', currentProblem.content);

            const grid = document.getElementById('option-grid');
            grid.innerHTML = '';
            selectedOption = null;

            currentProblem.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-4 border-2 border-slate-100 rounded-2xl text-[14px] bg-white hover:border-blue-300 transition-all text-left font-bold shadow-sm active:bg-blue-50 text-slate-700";
                btn.innerText = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                        b.classList.add('bg-white', 'text-slate-700', 'border-slate-100');
                    });
                    btn.classList.remove('bg-white', 'text-slate-700', 'border-slate-100');
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    selectedOption = opt;
                };
                grid.appendChild(btn);
            });

            showStep('step-quiz');
        }

        async function checkAnswer() {
            if (!selectedOption) { alert("전략을 선택하세요!"); return; }
            showStep('loading');
            document.getElementById('loading-text').innerText = "Gemini가 전략을 정밀 분석 중입니다...";

            const query = `사용자 전략: ${selectedOption}. 정답: ${currentProblem.correct_answer}. 문제: ${currentProblem.title}. 
            다음 JSON 형식으로 상세 리포트를 작성하세요 (수식은 $ 사용, 줄바꿈은 \\n 사용, 백슬래시 이중 처리):
            {
                "is_correct": boolean,
                "judgment": "마크다운 판단 근거 (N의 범위에 따른 시간복잡도 포함)",
                "strategy": "단계별 알고리즘 설계 프로세스",
                "concept": "핵심 알고리즘 개념 요약"
            }`;

            try {
                const response = await callGemini(query, "알고리즘 분석 전문가로서 답변하세요. JSON 규격을 엄격히 준수하세요.", true);
                const report = safeJsonParse(response);
                
                if (!solvedProblemTitles.includes(currentProblem.title)) {
                    solvedProblemTitles.push(currentProblem.title);
                }

                document.getElementById('result-problem-title').innerText = currentProblem.title;
                document.getElementById('result-problem-link').href = currentProblem.url;

                const statusDiv = document.getElementById('result-status');
                statusDiv.className = `text-center p-8 rounded-[2rem] border-2 ${report.is_correct ? 'bg-green-50 border-green-200 text-green-800' : 'bg-orange-50 border-orange-200 text-orange-800'}`;
                statusDiv.innerHTML = `<div class="text-5xl mb-4">${report.is_correct ? '🎯' : '💡'}</div><h3 class="text-2xl font-black">${report.is_correct ? '정확한 전략입니다!' : '전략 수정이 필요합니다.'}</h3><p class="text-sm mt-3 font-bold opacity-75">선택: ${selectedOption} | 최적: ${currentProblem.correct_answer}</p>`;

                renderMarkdown('exp-reason', report.judgment);
                renderMarkdown('exp-strategy', report.strategy);
                renderMarkdown('exp-concept', report.concept);

                showStep('step-result');
            } catch (error) {
                console.error(error);
                alert("리포트 생성 오류");
                showStep('step-quiz');
            }
        }

        function resetApp() {
            currentProblem = null;
            selectedOption = null;
            showStep('step-level');
        }

        window.onload = initApp;
    </script>
</body>
</html>
